<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0a" />
    <!-- Self-hosted fonts: preload body font for fastest FCP -->
    <link rel="preload" href="/fonts/inter-latin.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Hero image preload — LCP element on landing page -->
    <link rel="preload" href="/assets/team-cars-mobile.webp" as="image" type="image/webp" media="(max-width: 768px)" fetchpriority="high" />
    <link rel="preload" href="/assets/team-cars-desktop.webp" as="image" type="image/webp" media="(min-width: 769px)" fetchpriority="high" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div id="app">%sveltekit.body%</div>
  </body>
</html>
